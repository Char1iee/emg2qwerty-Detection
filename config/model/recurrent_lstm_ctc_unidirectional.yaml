# @package _global_
# LSTM unidirectional (no backward pass)
module:
  _target_: emg2qwerty.lightning.RecurrentCTCModule
  in_features: 528
  mlp_features: [384]
  recurrent_type: lstm
  hidden_size: 384
  num_layers: 3
  dropout: 0.2
  bidirectional: false

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]
